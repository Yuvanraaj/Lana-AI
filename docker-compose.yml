version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
#  LANA AI — Docker Compose
#
#  Usage:
#    docker compose up --build        # first run (builds images)
#    docker compose up -d             # start in background
#    docker compose down              # stop all services
#    docker compose logs -f frontend  # tail a single service log
#
#  All configuration comes from the root .env file.
#  Database: Supabase (PostgreSQL) — set DATABASE_URL in .env
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Python / FastAPI backend (Resume Analyzer) ───────────────────────────────
  python-backend:
    build:
      context: ./AI-Resume-Analyzer/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - resume_uploads:/app/uploads
    networks:
      - lana-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Node.js / Express backend (Interview Bot) ────────────────────────────────
  node-backend:
    build:
      context: ./Virtual_Agent1/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - node_data:/app/data
    networks:
      - lana-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── React frontend (Nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./Virtual_Agent1/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_RESUME_API_URL: ${VITE_RESUME_API_URL:-}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      node-backend:
        condition: service_healthy
      python-backend:
        condition: service_healthy
    networks:
      - lana-net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  resume_uploads:   # Uploaded resume files
  node_data:        # SQLite database for interview sessions

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  lana-net:
    driver: bridge
