server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Max upload size (resume files up to 15 MB) ──────────────────────────
    client_max_body_size 15m;

    # ── Node.js backend: Interview Bot API ──────────────────────────────────
    location /api/ {
        proxy_pass         http://node-backend:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Anam WebSocket proxy (HTTP → WS upgrade) ────────────────────────────
    location /api/anam-proxy {
        proxy_pass          http://node-backend:8001;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "Upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
    }

    # ── Node.js health (internal, strip prefix) ─────────────────────────────
    location /health {
        proxy_pass http://node-backend:8001/health;
        proxy_set_header Host $host;
    }

    # ── Python backend: Resume Analyzer (strip /resume-api prefix) ──────────
    location /resume-api/ {
        rewrite           ^/resume-api/(.*) /$1 break;
        proxy_pass        http://python-backend:8000;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── React SPA fallback ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/json
        application/javascript text/javascript
        application/xml text/xml image/svg+xml;
}
